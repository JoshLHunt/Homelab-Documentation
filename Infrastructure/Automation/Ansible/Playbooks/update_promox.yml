- name: Update Proxmox Nodes
hosts: proxmox_nodes
Serial: 1

tasks

  - name: Print update start time
    shell: date
    register: starttime
    changed_when: false

    -debug:
      msg: "Starting apt update at {{ starttime.stdout }}"

  - name: Update apt cache
    apt:
      update_cache: yes

  - name: Print upgrade start time
    shell: date
    register: upgradetime
    changed_when: false

  - debug:
      msg: "Starting apt upgrade at {{ upgradetime.stdout }}"

  - name: Upgrade packages
    apt:
      upgrade: dist
      
  - name: Remove unused pachages
    apt:
      autoremove: yes

  - name: check if reboot is required
    stat:
      path: /var/run/reboot_required
    register: reboot_required

  - name: reboot node if required
    reboot:
      msg: "Reboot initiated by Ansible after updates"
      connect_timeout: 5
      reboot_timeout: 600
    when: reboot_required.stat.exists
